services:
  # Первый инстанс брокера
  kafka-0:
    image: bitnamilegacy/kafka:3.4
    ports:
      - "9094:9094"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka-0:9093,1@kafka-1:9093
      - KAFKA_KRAFT_CLUSTER_ID=abcdefghijklmnopqrstuv
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-0:9092,EXTERNAL://127.0.0.1:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=false

    volumes:
      - kafka_0_data:/bitnami/kafka

  # Второй инстанс брокера
  kafka-1:
    image: bitnamilegacy/kafka:3.4
    ports:
      - "9095:9095"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka-0:9093,1@kafka-1:9093
      - KAFKA_KRAFT_CLUSTER_ID=abcdefghijklmnopqrstuv
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9095
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka-1:9092,EXTERNAL://127.0.0.1:9095
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=false

    volumes:
      - kafka_1_data:/bitnami/kafka

  kafka-init:
    image: bitnamilegacy/kafka:3.4
    depends_on:
      - kafka-0
      - kafka-1
    command: >
      bash -c '
      echo "Waiting for Kafka...";

      until kafka-topics.sh --bootstrap-server kafka-0:9092 --list >/dev/null 2>&1; do
        echo "Kafka not ready yet...";
        sleep 2;
      done;

      echo "Kafka is ready. Creating topic...";

      kafka-topics.sh \
        --create \
        --if-not-exists \
        --topic my-topic \
        --bootstrap-server kafka-0:9092 \
        --partitions 3 \
        --replication-factor 2;

      echo "Topic created. Exiting."
      '

  # Веб-панель
  ui:
    image: provectuslabs/kafka-ui:v0.7.0
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_BOOTSTRAP_SERVERS=kafka-0:9092
      - KAFKA_CLUSTERS_0_NAME=kraft

  # Конфигурация producer
  producer:
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    build: .
    container_name: producer
    command:
      - "java"
      - "-jar"
      - "/app/producer.jar"
      - "kafka-0:9092" # адрес брокера
      - "my-topic"  # название топика

  # Конфигурация получателя "по-одному"
  single-message-consumer:
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    deploy:
      replicas: 2
    build: .
    command:
      - "java"
      - "-jar"
      - "/app/single-message-consumer.jar"
      - "kafka-0:9092" # адрес брокера
      - "group1"  # название consumer group
      - "my-topic"  # название топика

  # Конфигурация получателя "пачкой"
  batch-message-consumer:
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    deploy:
      replicas: 2
    build: .
    command:
      - "java"
      - "-jar"
      - "/app/batch-message-consumer.jar"
      - "kafka-0:9092" # адрес брокера
      - "group2" # название consumer group
      - "my-topic" # название топика
      - "800" # минимальное количество байт для считывания (подобрано опытным путём для считывания пачки по 10)

volumes:
  kafka_0_data:
  kafka_1_data: